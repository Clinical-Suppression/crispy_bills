name: Release Build (EXE + Android)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install MAUI Android workload
        run: dotnet workload install maui-android --skip-manifest-update

      - name: Restore
        run: dotnet restore ./CrispyBills.sln

      - name: Publish desktop EXE (Release)
        shell: pwsh
        run: |
          dotnet publish './CrispyBills.csproj' -c Release -r win-x64 --self-contained true /p:PublishSingleFile=true /p:IncludeNativeLibrariesForSelfExtract=true /p:EnableCompressionInSingleFile=true /p:PublishReadyToRun=true -o './artifacts/ci/win-x64'

      - name: Prepare Android signing keystore (optional)
        id: android_signing
        shell: pwsh
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:ANDROID_KEYSTORE_BASE64)) {
            "enabled=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            Write-Host 'No ANDROID_KEYSTORE_BASE64 secret found. Building unsigned APK only.'
            exit 0
          }

          New-Item -ItemType Directory -Force -Path './signing' | Out-Null
          [System.IO.File]::WriteAllBytes('./signing/release.keystore', [System.Convert]::FromBase64String($env:ANDROID_KEYSTORE_BASE64))
          "enabled=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Publish Android APK (unsigned fallback)
        if: steps.android_signing.outputs.enabled != 'true'
        shell: pwsh
        run: |
          dotnet publish './CrispyBills.Mobile.Android/CrispyBills.Mobile.Android.csproj' -f net9.0-android -c Release -o './artifacts/ci/net9.0-android' -p:AndroidPackageFormats=apk

      - name: Publish Android APK + AAB (signed)
        if: steps.android_signing.outputs.enabled == 'true'
        shell: pwsh
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          dotnet publish './CrispyBills.Mobile.Android/CrispyBills.Mobile.Android.csproj' -f net9.0-android -c Release -o './artifacts/ci/net9.0-android' -p:AndroidPackageFormats="apk;aab" -p:AndroidKeyStore=true -p:AndroidSigningKeyStore='./signing/release.keystore' -p:AndroidSigningStorePass="$env:ANDROID_KEYSTORE_PASSWORD" -p:AndroidSigningKeyAlias="$env:ANDROID_KEY_ALIAS" -p:AndroidSigningKeyPass="$env:ANDROID_KEY_PASSWORD"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: crispybills-release-artifacts
          path: |
            artifacts/ci/win-x64/**
            artifacts/ci/net9.0-android/**
          if-no-files-found: error

      - name: Publish GitHub Release (disabled; local publish is source of truth)
        if: false
        run: |
          Write-Host 'Disabled to avoid conflicts with local publish automation.'
